<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atmung Simulation</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      color: white;
    }

    .container {
      width: 100%;
      max-width: 900px;
      padding: 24px;
      text-align: center;
    }

    button {
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: white;
      border: none;
      border-radius: 999px;
      padding: 14px 40px;
      font-size: clamp(1.1rem, 2vw, 1.5rem);
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 18px rgba(0, 140, 255, 0.7);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      margin-bottom: 28px;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 28px rgba(0, 140, 255, 1);
    }

    button:active {
      transform: scale(0.96);
    }

    img {
      width: 100%;
      max-width: 700px;
      height: auto;
      display: block;
      margin: 0 auto;
    }
  </style>
</head>

<body>
  <div class="container">
    <button id="toggleButton">Start</button>

    <img
      id="animationImage"
      src="AtmungSimulationStand.png"
      alt="Atmung Simulation"
    />
  </div>

  <script>
    const button = document.getElementById("toggleButton");
    const image = document.getElementById("animationImage");

    let isRunning = false;

    button.addEventListener("click", () => {
      isRunning = !isRunning;

      if (isRunning) {
        button.textContent = "Stop";
        image.src = "AtmungSimulation3333.gif";
      } else {
        button.textContent = "Start";
        image.src = "AtmungSimulationStand.png";
      }
    });
  </script>
</body>
</html>
